name: CI & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run smoke tests
        run: node test/smoke.mjs

  publish:
    # Only on merges/pushes to main, after tests pass.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # Publishes ONLY when package.json "version" is not already on npm.
      # If the version is unchanged, this step no-ops (no error) — so a merge
      # that doesn't bump the version simply skips publishing.
      - name: Publish to npm (only if version changed)
        uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
